services:

  mysql:
    image: mysql:8
    container_name: mysql_db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: bdd
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  back-ventas:
    build:
      context: "./proyecto-semestral/back-Ventas_SpringBoot/Springboot-API-REST"
    container_name: spring_ventas
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DB_ENDPOINT: mysql
      DB_PORT: 3306
      DB_NAME: bdd
      DB_USERNAME: root
      DB_PASSWORD: root

  back-despachos:
    build:
      context: "./proyecto-semestral/back-Despachos_SpringBoot/Springboot-API-REST-DESPACHO"
    container_name: spring_despachos
    ports:
      - "8081:8081"
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DB_ENDPOINT: mysql
      DB_PORT: 3306
      DB_NAME: bdd
      DB_USERNAME: root
      DB_PASSWORD: root

  frontend:
    build:
      context: "./proyecto-semestral/front_despacho"
    container_name: react_frontend
    ports:
      - "3000:80"
    depends_on:
      - back-ventas
      - back-despachos

volumes:
  mysql_data: