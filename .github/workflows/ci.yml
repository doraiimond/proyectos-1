name: CI/CD - Deploy completo

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  AWS_REGION: "us-east-1"
  TF_VERSION: "1.7.0"

jobs:
  # ─────────────────────────────────────────
  # JOB 1: Terraform - crea toda la infra incluyendo ECR
  # ─────────────────────────────────────────
  terraform:
    name: "Terraform Apply"
    runs-on: ubuntu-latest
    outputs:
      alb_dns: ${{ steps.tf_outputs.outputs.alb_dns }}
      s3_bucket: ${{ steps.tf_outputs.outputs.s3_bucket }}
      ecr_ventas: ${{ steps.tf_outputs.outputs.ecr_ventas }}
      ecr_despachos: ${{ steps.tf_outputs.outputs.ecr_despachos }}

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Instalar Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Terraform Init
        working-directory: terraform
        run: terraform init

      - name: Terraform Validate
        working-directory: terraform
        run: terraform validate

      - name: Terraform Plan
        working-directory: terraform
        run: |
          terraform plan \
            -var="ssh_public_key=${{ secrets.SSH_PUBLIC_KEY }}" \
            -out=tfplan

      - name: Terraform Apply
        working-directory: terraform
        run: terraform apply -auto-approve tfplan

      - name: Capturar outputs de Terraform
        id: tf_outputs
        working-directory: terraform
        run: |
          echo "alb_dns=$(terraform output -raw alb_dns_name)" >> $GITHUB_OUTPUT
          echo "s3_bucket=$(terraform output -raw s3_bucket_name)" >> $GITHUB_OUTPUT
          echo "ecr_ventas=$(terraform output -raw ecr_ventas_url)" >> $GITHUB_OUTPUT
          echo "ecr_despachos=$(terraform output -raw ecr_despachos_url)" >> $GITHUB_OUTPUT

  # ─────────────────────────────────────────
  # JOB 2: Build y Push Backend Ventas a ECR
  # ─────────────────────────────────────────
  build-ventas:
    name: Build Backend Ventas
    runs-on: ubuntu-latest
    needs: terraform

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login a ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build y Push Backend Ventas
        working-directory: proyecto-semestral/back-Ventas_SpringBoot/Springboot-API-REST
        run: |
          docker build -t ${{ needs.terraform.outputs.ecr_ventas }} .
          docker push ${{ needs.terraform.outputs.ecr_ventas }}

  # ─────────────────────────────────────────
  # JOB 3: Build y Push Backend Despachos a ECR
  # ─────────────────────────────────────────
  build-despachos:
    name: Build Backend Despachos
    runs-on: ubuntu-latest
    needs: terraform

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login a ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build y Push Backend Despachos
        working-directory: proyecto-semestral/back-Despachos_SpringBoot/Springboot-API-REST-DESPACHO
        run: |
          docker build -t ${{ needs.terraform.outputs.ecr_despachos }} .
          docker push ${{ needs.terraform.outputs.ecr_despachos }}

  # ─────────────────────────────────────────
  # JOB 4: Build y Deploy Frontend a S3
  # ─────────────────────────────────────────
  deploy-frontend:
    name: Build y Deploy Frontend
    runs-on: ubuntu-latest
    needs: [build-ventas, build-despachos]

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Instalar dependencias frontend
        working-directory: proyecto-semestral/front_despacho
        run: npm ci

      - name: Build frontend con URL del ALB
        working-directory: proyecto-semestral/front_despacho
        env:
          VITE_API_VENTAS: "http://${{ needs.build-ventas.outputs.alb_dns || needs.terraform.outputs.alb_dns }}"
          VITE_API_DESPACHOS: "http://${{ needs.build-despachos.outputs.alb_dns || needs.terraform.outputs.alb_dns }}"
        run: npm run build

      - name: Subir frontend a S3
        run: |
          aws s3 sync \
            proyecto-semestral/front_despacho/dist/ \
            s3://${{ needs.terraform.outputs.s3_bucket }} \
            --delete \
            --cache-control "max-age=86400"

          aws s3 cp \
            proyecto-semestral/front_despacho/dist/index.html \
            s3://${{ needs.terraform.outputs.s3_bucket }}/index.html \
            --cache-control "no-cache, no-store, must-revalidate"

      - name: Resumen del deploy
        run: |
          echo "## ✅ Deploy exitoso" >> $GITHUB_STEP_SUMMARY
          echo "| Servicio | URL |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-----|" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend | http://${{ needs.terraform.outputs.s3_bucket }}.s3-website-us-east-1.amazonaws.com |" >> $GITHUB_STEP_SUMMARY
          echo "| API (ALB) | http://${{ needs.terraform.outputs.alb_dns }} |" >> $GITHUB_STEP_SUMMARY
