name: CI - Build y Push a ECR

on:
  push:
    branches:
      - main

env:
  AWS_REGION: "us-east-1"

jobs:
  # ─────────────────────────────────────────
  # BUILD BACKEND VENTAS
  # ─────────────────────────────────────────
  build-ventas:
    name: Build Backend Ventas
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login a ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build y Push Backend Ventas
        working-directory: proyecto-semestral/back-Ventas_SpringBoot/Springboot-API-REST
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker build -t $ECR_REGISTRY/proyecto-back-ventas:latest .
          docker push $ECR_REGISTRY/proyecto-back-ventas:latest

  # ─────────────────────────────────────────
  # BUILD BACKEND DESPACHOS
  # ─────────────────────────────────────────
  build-despachos:
    name: Build Backend Despachos
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login a ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build y Push Backend Despachos
        working-directory: proyecto-semestral/back-Despachos_SpringBoot/Springboot-API-REST-DESPACHO
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker build -t $ECR_REGISTRY/proyecto-back-despachos:latest .
          docker push $ECR_REGISTRY/proyecto-back-despachos:latest

  # ─────────────────────────────────────────
  # DEPLOY (corre después de ambos builds)
  # ─────────────────────────────────────────
  deploy:
    name: Deploy Infraestructura + Frontend
    runs-on: ubuntu-latest
    needs: [build-ventas, build-despachos]

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login a ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Instalar Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"
          terraform_wrapper: false

      - name: Terraform Init
        working-directory: terraform
        run: terraform init

      - name: Terraform Validate
        working-directory: terraform
        run: terraform validate

      - name: Terraform Plan
        working-directory: terraform
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          terraform plan \
            -var="ssh_public_key=${{ secrets.SSH_PUBLIC_KEY }}" \
            -var="ecr_ventas_url=$ECR_REGISTRY/proyecto-back-ventas:latest" \
            -var="ecr_despachos_url=$ECR_REGISTRY/proyecto-back-despachos:latest" \
            -out=tfplan

      - name: Terraform Apply
        working-directory: terraform
        run: terraform apply -auto-approve tfplan

      - name: Capturar outputs de Terraform
        id: tf_outputs
        working-directory: terraform
        run: |
          echo "alb_dns=$(terraform output -raw alb_dns_name)" >> $GITHUB_OUTPUT
          echo "s3_bucket=$(terraform output -raw s3_bucket_name)" >> $GITHUB_OUTPUT

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Instalar dependencias frontend
        working-directory: proyecto-semestral/front_despacho
        run: npm ci

      - name: Build frontend con URL del ALB
        working-directory: proyecto-semestral/front_despacho
        env:
          VITE_API_VENTAS: "http://${{ steps.tf_outputs.outputs.alb_dns }}"
          VITE_API_DESPACHOS: "http://${{ steps.tf_outputs.outputs.alb_dns }}"
        run: npm run build

      - name: Subir frontend a S3
        run: |
          aws s3 sync \
            proyecto-semestral/front_despacho/dist/ \
            s3://${{ steps.tf_outputs.outputs.s3_bucket }} \
            --delete \
            --cache-control "max-age=86400"

          aws s3 cp \
            proyecto-semestral/front_despacho/dist/index.html \
            s3://${{ steps.tf_outputs.outputs.s3_bucket }}/index.html \
            --cache-control "no-cache, no-store, must-revalidate"

      - name: Resumen del deploy
        run: |
          echo "## ✅ Deploy exitoso" >> $GITHUB_STEP_SUMMARY
          echo "| Servicio | URL |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-----|" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend | http://${{ steps.tf_outputs.outputs.s3_bucket }}.s3-website-us-east-1.amazonaws.com |" >> $GITHUB_STEP_SUMMARY
          echo "| API (ALB) | http://${{ steps.tf_outputs.outputs.alb_dns }} |" >> $GITHUB_STEP_SUMMARY
