name: Despliegue en AWS con EKS

on:
  push:
    branches:
      - deploy

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      CLUSTER_NAME: ${{ vars.EKS_CLUSTER_NAME }}
      K8S_NAMESPACE: ${{ vars.K8S_NAMESPACE }}
      ECR_FRONTEND_REPOSITORY: ${{ vars.ECR_FRONTEND_REPOSITORY }}
      ECR_VENTAS_REPOSITORY: ${{ vars.ECR_VENTAS_REPOSITORY }}
      ECR_DESPACHOS_REPOSITORY: ${{ vars.ECR_DESPACHOS_REPOSITORY }}
      IMAGE_TAG: ${{ github.sha }}

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar credenciales de AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Instalar dependencias para plantillas
        run: |
          sudo apt-get update
          sudo apt-get install -y gettext-base

      - name: Login con Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Crear URLs de los repositorios ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          echo "FRONTEND_DESPACHO_ECR=${ECR_REGISTRY}/${ECR_FRONTEND_REPOSITORY}" >> "$GITHUB_ENV"
          echo "BACKEND_VENTAS_ECR=${ECR_REGISTRY}/${ECR_VENTAS_REPOSITORY}" >> "$GITHUB_ENV"
          echo "BACKEND_DESPACHOS_ECR=${ECR_REGISTRY}/${ECR_DESPACHOS_REPOSITORY}" >> "$GITHUB_ENV"

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build imagen Frontend Despacho
        run: |
          docker buildx build \
            --platform linux/amd64 \
            -t "$FRONTEND_DESPACHO_ECR:$IMAGE_TAG" \
            ./frontend/front_despacho \
            --load

      - name: Subir imagen Frontend Despacho a ECR
        run: |
          docker push "$FRONTEND_DESPACHO_ECR:$IMAGE_TAG"

      - name: Build imagen Backend Ventas
        run: |
          docker buildx build \
            --platform linux/amd64 \
            -t "$BACKEND_VENTAS_ECR:$IMAGE_TAG" \
            ./backend/back-Ventas_SpringBoot/Springboot-API-REST \
            --load

      - name: Subir imagen Backend Ventas a ECR
        run: |
          docker push "$BACKEND_VENTAS_ECR:$IMAGE_TAG"

      - name: Build imagen Backend Despachos
        run: |
          docker buildx build \
            --platform linux/amd64 \
            -t "$BACKEND_DESPACHOS_ECR:$IMAGE_TAG" \
            ./backend/back-Despachos_SpringBoot/Springboot-API-REST-DESPACHO \
            --load

      - name: Subir imagen Backend Despachos a ECR
        run: |
          docker push "$BACKEND_DESPACHOS_ECR:$IMAGE_TAG"

      - name: Instalar kubectl
        uses: azure/setup-kubectl@v4

      - name: Conectarse al cluster EKS
        run: |
          aws eks update-kubeconfig \
            --region "$AWS_REGION" \
            --name "$CLUSTER_NAME"

      - name: Instalar Metrics Server
        run: |
          kubectl apply -f https://github.com/kubernetes-sigs/metrics-server/releases/latest/download/components.yaml --validate=false --request-timeout=5m
          kubectl rollout status deployment/metrics-server -n kube-system --timeout=300s

      - name: Preparar manifiestos de Kubernetes
        run: |
          mkdir -p infra/k8s-build

          export FRONTEND_DESPACHO_IMAGE="$FRONTEND_DESPACHO_ECR:$IMAGE_TAG"
          export BACKEND_VENTAS_IMAGE="$BACKEND_VENTAS_ECR:$IMAGE_TAG"
          export BACKEND_DESPACHOS_IMAGE="$BACKEND_DESPACHOS_ECR:$IMAGE_TAG"

          envsubst < infra/k8s/frontend-deployment.yml > infra/k8s-build/frontend-deployment.yml
          envsubst < infra/k8s/backend-ventas-deployment.yml > infra/k8s-build/backend-ventas-deployment.yml
          envsubst < infra/k8s/backend-despachos-deployment.yml > infra/k8s-build/backend-despachos-deployment.yml

          cp infra/k8s/namespace.yml infra/k8s-build/
          cp infra/k8s/configmap.yml infra/k8s-build/
          cp infra/k8s/secrets.yml infra/k8s-build/
          cp infra/k8s/mysql-deployment.yml infra/k8s-build/
          cp infra/k8s/mysql-service.yml infra/k8s-build/
          cp infra/k8s/backend-ventas-service.yml infra/k8s-build/
          cp infra/k8s/backend-despachos-service.yml infra/k8s-build/
          cp infra/k8s/frontend-service.yml infra/k8s-build/
          cp infra/k8s/hpa.yml infra/k8s-build/

      - name: Aplicar namespace
        run: |
          kubectl apply -f infra/k8s-build/namespace.yml --validate=false --request-timeout=5m

      - name: Aplicar ConfigMap y Secret
        run: |
          kubectl apply -f infra/k8s-build/configmap.yml -n "$K8S_NAMESPACE" --validate=false --request-timeout=5m
          kubectl apply -f infra/k8s-build/secrets.yml -n "$K8S_NAMESPACE" --validate=false --request-timeout=5m

      - name: Aplicar MySQL
        run: |
          kubectl apply -f infra/k8s-build/mysql-deployment.yml -n "$K8S_NAMESPACE" --validate=false --request-timeout=5m
          kubectl apply -f infra/k8s-build/mysql-service.yml -n "$K8S_NAMESPACE" --validate=false --request-timeout=5m

      - name: Aplicar Backends
        run: |
          kubectl apply -f infra/k8s-build/backend-ventas-deployment.yml -n "$K8S_NAMESPACE" --validate=false --request-timeout=5m
          kubectl apply -f infra/k8s-build/backend-ventas-service.yml -n "$K8S_NAMESPACE" --validate=false --request-timeout=5m
          kubectl apply -f infra/k8s-build/backend-despachos-deployment.yml -n "$K8S_NAMESPACE" --validate=false --request-timeout=5m
          kubectl apply -f infra/k8s-build/backend-despachos-service.yml -n "$K8S_NAMESPACE" --validate=false --request-timeout=5m

      - name: Aplicar Frontend
        run: |
          kubectl apply -f infra/k8s-build/frontend-deployment.yml -n "$K8S_NAMESPACE" --validate=false --request-timeout=5m
          kubectl apply -f infra/k8s-build/frontend-service.yml -n "$K8S_NAMESPACE" --validate=false --request-timeout=5m

      - name: Aplicar HPA
        run: |
          kubectl apply -f infra/k8s-build/hpa.yml -n "$K8S_NAMESPACE" --validate=false --request-timeout=5m

      - name: Esperar despliegue de MySQL
        run: |
          kubectl rollout status deployment/mysql -n "$K8S_NAMESPACE" --timeout=300s

      - name: Esperar despliegue del Backend Ventas
        run: |
          kubectl rollout status deployment/backend-ventas -n "$K8S_NAMESPACE" --timeout=300s

      - name: Esperar despliegue del Backend Despachos
        run: |
          kubectl rollout status deployment/backend-despachos -n "$K8S_NAMESPACE" --timeout=300s

      - name: Esperar despliegue del Frontend Despacho
        run: |
          kubectl rollout status deployment/frontend-despacho -n "$K8S_NAMESPACE" --timeout=300s

      - name: Mostrar recursos desplegados
        run: |
          kubectl get pods -n "$K8S_NAMESPACE" -o wide
          kubectl get svc -n "$K8S_NAMESPACE"
          kubectl get hpa -n "$K8S_NAMESPACE"
          kubectl top nodes || true
          kubectl top pods -n "$K8S_NAMESPACE" || true

      - name: Obtener URL del Frontend
        run: |
          FRONTEND_SERVICE="frontend-despacho-service"

          echo "Esperando URL publica del LoadBalancer..."

          for i in {1..60}; do
            FRONTEND_HOST=$(kubectl get svc "$FRONTEND_SERVICE" -n "$K8S_NAMESPACE" -o jsonpath='{.status.loadBalancer.ingress[0].hostname}' 2>/dev/null || true)
            FRONTEND_IP=$(kubectl get svc "$FRONTEND_SERVICE" -n "$K8S_NAMESPACE" -o jsonpath='{.status.loadBalancer.ingress[0].ip}' 2>/dev/null || true)

            if [ -n "$FRONTEND_HOST" ]; then
              FRONTEND_URL="http://$FRONTEND_HOST"
              break
            fi

            if [ -n "$FRONTEND_IP" ]; then
              FRONTEND_URL="http://$FRONTEND_IP"
              break
            fi

            echo "LoadBalancer aun pendiente... intento $i/60"
            sleep 10
          done

          if [ -z "${FRONTEND_URL:-}" ]; then
            echo "No se pudo obtener la URL del frontend."
            echo "Estado actual del servicio:"
            kubectl get svc "$FRONTEND_SERVICE" -n "$K8S_NAMESPACE" -o wide
            exit 1
          fi

          echo "URL del Frontend: $FRONTEND_URL"
          echo "FRONTEND_URL=$FRONTEND_URL" >> "$GITHUB_ENV"

          echo "## Frontend desplegado correctamente" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### URL del Frontend" >> "$GITHUB_STEP_SUMMARY"
          echo "[Abrir Frontend]($FRONTEND_URL)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Servicio Kubernetes: \`$FRONTEND_SERVICE\`" >> "$GITHUB_STEP_SUMMARY"

          echo "::notice title=URL Frontend::$FRONTEND_URL"