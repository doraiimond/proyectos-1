name: Terraform + Deploy EKS

on:
  push:
    branches:
      - develop

env:
  AWS_REGION: us-east-1
  EKS_CLUSTER: innovatech-eks

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1

      # -------------------------
      # TERRAFORM
      # -------------------------

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: infra/terraform
        run: terraform init

      - name: Terraform Apply
        working-directory: infra/terraform
        run: terraform apply -auto-approve

      - name: Esperar EKS
        run: |
          aws eks wait cluster-active \
            --name innovatech-eks \
            --region us-east-1

      # -------------------------
      # ECR
      # -------------------------

      - name: Login ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # -------------------------
      # BACKEND VENTAS
      # -------------------------

      - name: Build Backend Ventas
        run: |
          docker build \
          -t ${{ steps.login-ecr.outputs.registry }}/backend-ventas:latest \
          ./backend/back-Ventas_SpringBoot/Springboot-API-REST

      - name: Push Backend Ventas
        run: |
          docker push \
          ${{ steps.login-ecr.outputs.registry }}/backend-ventas:latest

      # -------------------------
      # BACKEND DESPACHOS
      # -------------------------

      - name: Build Backend Despachos
        run: |
          docker build \
          -t ${{ steps.login-ecr.outputs.registry }}/backend-despachos:latest \
          ./backend/back-Despachos_SpringBoot/Springboot-API-REST-DESPACHO

      - name: Push Backend Despachos
        run: |
          docker push \
          ${{ steps.login-ecr.outputs.registry }}/backend-despachos:latest

      # -------------------------
      # FRONTEND
      # -------------------------

      - name: Build Frontend
        run: |
          docker build \
          -t ${{ steps.login-ecr.outputs.registry }}/frontend-despacho:latest \
          ./frontend/front_despacho

      - name: Push Frontend
        run: |
          docker push \
          ${{ steps.login-ecr.outputs.registry }}/frontend-despacho:latest

      # -------------------------
      # KUBERNETES
      # -------------------------

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --region us-east-1 \
            --name innovatech-eks

      - name: Verificar conexión EKS
        run: kubectl get nodes

      - name: Aplicar manifiestos
        run: |
          kubectl apply -f infra/k8s/

      - name: Reiniciar Deployments
        run: |
          kubectl rollout restart deployment/backend-ventas
          kubectl rollout restart deployment/backend-despacho
          kubectl rollout restart deployment/frontend

      - name: Esperar Backend Ventas
        run: |
          kubectl rollout status deployment/backend-ventas --timeout=300s

      - name: Esperar Backend Despacho
        run: |
          kubectl rollout status deployment/backend-despacho --timeout=300s

      - name: Esperar Frontend
        run: |
          kubectl rollout status deployment/frontend --timeout=300s