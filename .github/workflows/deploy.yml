name: Deploy Infraestructura + Frontend

on:
  push:
    branches:
      - main        # deploy automático al hacer push a main
  workflow_dispatch: # también se puede lanzar manualmente desde GitHub

env:
  TF_VERSION: "1.7.0"
  AWS_REGION: "us-east-1"

jobs:
  # ─────────────────────────────────────────
  # JOB 1: Terraform (infraestructura)
  # ─────────────────────────────────────────
  terraform:
    name: "Terraform Apply"
    runs-on: ubuntu-latest
    outputs:
      alb_dns: ${{ steps.tf_outputs.outputs.alb_dns }}
      s3_bucket: ${{ steps.tf_outputs.outputs.s3_bucket }}

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Instalar Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Terraform Init
        working-directory: terraform
        run: terraform init

      - name: Terraform Validate
        working-directory: terraform
        run: terraform validate

      - name: Terraform Plan
        working-directory: terraform
        run: |
          terraform plan \
            -var="ssh_public_key=${{ secrets.SSH_PUBLIC_KEY }}" \
            -out=tfplan

      - name: Terraform Apply
        working-directory: terraform
        run: terraform apply -auto-approve tfplan

      - name: Capturar outputs de Terraform
        id: tf_outputs
        working-directory: terraform
        run: |
          echo "alb_dns=$(terraform output -raw alb_dns_name)" >> $GITHUB_OUTPUT
          echo "s3_bucket=$(terraform output -raw s3_bucket_name)" >> $GITHUB_OUTPUT

  # ─────────────────────────────────────────
  # JOB 2: Build y deploy del frontend a S3
  # (corre después de que Terraform termine)
  # ─────────────────────────────────────────
  deploy-frontend:
    name: "Build y Deploy Frontend"
    runs-on: ubuntu-latest
    needs: terraform

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: proyecto-semestral/front_despacho/package-lock.json

      - name: Instalar dependencias
        working-directory: proyecto-semestral/front_despacho
        run: npm ci

      - name: Build del frontend con la URL del ALB
        working-directory: proyecto-semestral/front_despacho
        env:
          VITE_API_URL: "http://${{ needs.terraform.outputs.alb_dns }}"
          VITE_API_VENTAS: "http://${{ needs.terraform.outputs.alb_dns }}"
          VITE_API_DESPACHOS: "http://${{ needs.terraform.outputs.alb_dns }}"
        run: npm run build

      - name: Subir build a S3
        run: |
          aws s3 sync \
            proyecto-semestral/front_despacho/dist/ \
            s3://${{ needs.terraform.outputs.s3_bucket }} \
            --delete \
            --cache-control "max-age=86400"

          # index.html sin caché para que siempre cargue la última versión
          aws s3 cp \
            proyecto-semestral/front_despacho/dist/index.html \
            s3://${{ needs.terraform.outputs.s3_bucket }}/index.html \
            --cache-control "no-cache, no-store, must-revalidate"

      - name: Resumen del deploy
        run: |
          echo "## ✅ Deploy exitoso" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Servicio | URL |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-----|" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend | http://$(aws s3api get-bucket-website --bucket ${{ needs.terraform.outputs.s3_bucket }} --query 'WebsiteEndpoint' --output text 2>/dev/null || echo '${{ needs.terraform.outputs.s3_bucket }}.s3-website-us-east-1.amazonaws.com') |" >> $GITHUB_STEP_SUMMARY
          echo "| API (ALB) | http://${{ needs.terraform.outputs.alb_dns }} |" >> $GITHUB_STEP_SUMMARY
